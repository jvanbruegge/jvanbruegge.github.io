<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>jvanbruegge: {{heading}}</title>
        <link rel="stylesheet" href="/style.css" />
        <link
            rel="alternate"
            type="application/atom+xml"
            title="jvanbruegge's blog >> Atom Feed"
            href="https://jvanbruegge.github.io/atom.xml"
        />
    </head>
    <body>
        {{> template/header.html}}
        <main>
            <header id="article-header">
                <a id="category" href="/">Home</a>
                <h1>{{heading}}</h1>
            </header>
            <div id="toc-placeholder"></div>
            <article id="postList">
                {{#posts}}
                <div>
                    <h2><a href="{{url}}">{{title}}</a></h2>
                    <span class="date">{{date}}</span>
                    <br />
                    <span class="description">{{description}}</span>
                </div>
                {{/posts}} {{^posts}}
                <h2>Nothing here yet :)</h2>
                {{/posts}}
            </article>
        </main>
    </body>
</html>
